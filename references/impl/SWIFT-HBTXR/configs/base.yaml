seed: 42

model:
  embed_dim: 192
  depth: 6
  num_heads: 3
  mlp_ratio: 4.0
  patch_size: 16
  input_size: [256, 256]
  dropout: 0.0
  aux_classes: 5

data:
  canonical_root: E:/WSL/Shared/dataset/Eye/EV_Eye/canonical
  input_size: [256, 256]
  resize_policy: facet_square_direct
  cache_root: data/_internal/cache
  use_cache: true
  per_channel_normalize: true
  event_builder:
    policy: fixed_count
    time_bin_us: 5000
    event_count_target: 5000
    accumulation: causal_linear
    causal_weight_power: 1.0
    polarity_split: true

interpolation:
  timelens_root: ../../references/timelens
  checkpoint_file: ../../references/timelens/refined_model/attention.bin
  python_bin: python
  frames_to_insert: 199
  frames_to_skip: 0
  prepared_root: data/_internal/timelens_ready
  prepared_summary_path: runs/interpolate/prepared_summary.json
  frame_source: auto
  link_mode: auto
  output_root: data/_internal/interpolated
  summary_path: runs/interpolate/summary.json

antiblink:
  enabled: false
  checkpoint: runs/import_swift_eye/antiblink_detector_real.pt
  report_path: runs/import_swift_eye/import_report.json
  closed_threshold: 0.2
  hold_threshold: 0.35
  detection_threshold: 0.75
  template_update_threshold: 0.95

training:
  stage: stage1
  batch_size: 8
  num_workers: 0
  grad_accum_steps: 1
  epochs: 5
  lr: 0.0003
  weight_decay: 0.0001
  amp: false
  device: cpu
  scheduler:
    type: none
    warmup_epochs: 0
    min_lr: 0.0
    metric_name: null
    factor: 0.5
    patience: 5
    threshold: 0.0
    step_size: 10
    gamma: 0.5
  early_stopping:
    enabled: false
    patience: 10
    min_delta: 0.0
    start_epoch: 1
  best_metric_name: null

experiment:
  name: swift_hbtxr_default
  train_manifest: data/_internal/manifests/train_manifest.jsonl
  val_manifest: data/_internal/manifests/val_manifest.jsonl
  test_manifest: data/_internal/manifests/test_manifest.jsonl
  output_dir: null
  init_checkpoint: null

loss:
  eye_weight: 1.0
  eye_conf_weight: 0.1
  mask_weight: 1.0
  search_xy_weight: 1.0
  search_ab_weight: 0.5
  search_trig_weight: 1.0
  search_geo_weight: 0.5
  search_conf_weight: 0.1
  event_xy_weight: 1.0
  event_ab_weight: 0.5
  event_trig_weight: 1.0
  event_geo_weight: 0.5
  event_conf_weight: 0.1
  track_xy_weight: 1.0
  track_ab_weight: 0.5
  track_trig_weight: 1.0
  track_geo_weight: 0.5
  track_conf_weight: 0.1
  track_quality_weight: 0.1
  consistency_weight: 0.2
  constraint_center_weight: 0.1
  constraint_center_radius: 24.0
  aux_weight: 0.1

runtime:
  search_conf_threshold: 0.35
  track_conf_threshold: 0.45
  track_quality_threshold: 0.45
  similarity_threshold: 0.5
  density_threshold: 0.002
  relocalize_cooldown: 2
  hold_last_on_blink: true
