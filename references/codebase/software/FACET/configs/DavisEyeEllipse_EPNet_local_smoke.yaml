---
dataloader:
  train:
    dataset:
      type: DavisEyeEllipseDataset
      root_path: /home/kjm26/project/dataset/XR/EV_Eye/raw_data/DeanDataset
      split: train
      accumulate_mode: fixed_count
      sensor_size: [346, 260, 2]
      events_interpolation: causal_linear_ori
      pupil_area: 200
      num_classes: 1
      default_resolution: [256, 256]
    batch_size: 2
    shuffle: false
    drop_last: false
    num_workers: 0
    persistent_workers: false
    pin_memory: false

  val:
    dataset:
      type: DavisEyeEllipseDataset
      root_path: /home/kjm26/project/dataset/XR/EV_Eye/raw_data/DeanDataset
      split: val
      accumulate_mode: fixed_count
      sensor_size: [346, 260, 2]
      events_interpolation: causal_linear_ori
      pupil_area: 200
      num_classes: 1
      default_resolution: [256, 256]
    batch_size: 2
    shuffle: false
    drop_last: false
    num_workers: 0
    persistent_workers: false
    pin_memory: false

model:
  type: EPNet
  input_channels: 2
  head_dict: { "hm": 1, "ab": 2, "trig": 2, "reg": 2, "mask": 1 }
  mode: fpn_2d
  loss_weight: {
      "hm_weight": 1,
      "ab_weight": 0.1,
      "ang_weight": 0,
      "trig_weight": 1,
      "reg_weight": 0.1,
      "iou_weight": 15,
      "mask_weight": 1,
    }

train:
  max_epochs: 1
  check_val_every_n_epoch: 1
  optimizer:
    learning_rate: 1.0e-3
    weight_decay: 1.0e-5

val:
  ckpt_path:

trainer:
  accelerator: cpu
  devices: 1
  fast_dev_run: true
  num_sanity_val_steps: 0
  default_root_dir: /home/kjm26/project/PRJXR/HBTXR/references/codebase/software/FACET/runs/smoke

logger:
  type: tensorboard
  save_dir: /home/kjm26/project/PRJXR/HBTXR/references/codebase/software/FACET/runs/logs
  name: EPNet_local_smoke

callback:
  - type: TQDMProgressBar
    refresh_rate: 1

  - type: Timer
