---
dataloader:
  train:
    dataset:
      type: DavisEyeEllipseDataset
      root_path: /home/kjm26/project/dataset/XR/EV_Eye/raw_data/DeanDataset_full_unet
      split: train
      accumulate_mode: fixed_count
      sensor_size: [346, 260, 2]
      events_interpolation: causal_linear_ori
      pupil_area: 200
      num_classes: 1
      default_resolution: [256, 256]
    batch_size: 4
    shuffle: true
    drop_last: false
    num_workers: 4
    persistent_workers: true
    pin_memory: true

  val:
    dataset:
      type: DavisEyeEllipseDataset
      root_path: /home/kjm26/project/dataset/XR/EV_Eye/raw_data/DeanDataset_full_unet
      split: val
      accumulate_mode: fixed_count
      sensor_size: [346, 260, 2]
      events_interpolation: causal_linear_ori
      pupil_area: 200
      num_classes: 1
      default_resolution: [256, 256]
    batch_size: 4
    shuffle: false
    drop_last: false
    num_workers: 4
    persistent_workers: true
    pin_memory: true

model:
  type: HBTXR
  input_channels: 2
  img_size: 256
  patch_size: 4
  embed_dim: 192
  depth: 8
  num_heads: 3
  projection_channels: 64
  projection_kernel_size: 1
  head_conv: 256
  pretrained: false
  head_dict: { "hm": 1, "ab": 2, "trig": 2, "reg": 2, "mask": 1 }
  loss_weight: {
      "hm_weight": 1,
      "ab_weight": 0.1,
      "ang_weight": 0,
      "trig_weight": 1,
      "reg_weight": 0.1,
      "iou_weight": 15,
      "mask_weight": 1,
    }

train:
  max_epochs: 70
  check_val_every_n_epoch: 1
  optimizer:
    learning_rate: 1.0e-3
    weight_decay: 1.0e-5

val:
  ckpt_path:

trainer:
  accelerator: auto
  devices: auto
  default_root_dir: /home/kjm26/project/PRJXR/HBTXR/references/codebase/software/FACET/runs/full_unet_hbtxr

logger:
  type: tensorboard
  save_dir: /home/kjm26/project/PRJXR/HBTXR/references/codebase/software/FACET/runs/logs
  name: HBTXR_full_unet

callback:
  - type: ModelCheckpoint
    monitor: val_mean_distance
    auto_insert_metric_name: true
    save_top_k: 3
    mode: min
    every_n_epochs: 1
    save_last: true
    verbose: true
    filename: "{epoch:02d}-{val_mean_distance:.4f}"

  - type: ModelCheckpoint
    dirpath: /home/kjm26/project/PRJXR/HBTXR/references/codebase/software/FACET/runs/logs/HBTXR_full_unet/step_checkpoints/checkpoints
    filename: "step-{step:08d}"
    monitor:
    auto_insert_metric_name: false
    save_top_k: 1
    mode: min
    every_n_train_steps: 5000
    every_n_epochs: 0
    save_last: true
    save_on_train_epoch_end: false
    verbose: true

  - type: TQDMProgressBar
    refresh_rate: 1

  - type: Timer

  - type: LearningRateMonitor
    logging_interval: epoch
