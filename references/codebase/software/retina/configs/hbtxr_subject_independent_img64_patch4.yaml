training_params:
  arch_name: retina_ann
  lr_model: 0.001
  weight_decay: 0.00001
  num_epochs: 70
  batch_size: 32
  num_workers: 4
  optimizer: Adam
  scheduler: HBTXRStepLR

  lr_model_lpf: 0.0001
  lr_model_lpf_tau: 0.001
  lpf_tau_mem_syn: [5.0, 5.0]
  lpf_kernel_size: 30
  lpf_init: 0.01
  lpf_train: true
  reset_states_sinabs: true
  w_spike_loss: 0
  w_synap_loss: 0
  spike_multi: false
  spike_reset: false
  spike_surrogate: true
  spike_window: 0.5
  synops_lim: [1000, 1000000]
  w_input_loss: 0
  w_fire_loss: 0
  firing_lim: [0.3, 0.4]
  verify_hardware_compatibility: false

  w_euclidian_loss: 1
  w_box_loss: 7.5
  w_conf_loss: 7.5
  SxS_Grid: 4
  num_classes: 0
  num_boxes: 1
  bbox_w: 5

dataset_params:
  dataset_name: hbtxr-dean-subject-independent
  root_path: /mnt/d/dataset/EV_Eye/target_data/DeanDataset_full_unet_subject_independent
  facet_root: /home/user/project/PRJXR/HBTXR/references/codebase/software/FACET
  events_interpolation: causal_linear_ori
  pupil_area: 200

  num_bins: 1
  input_channel: 2
  img_width: 64
  img_height: 64

  events_per_frame: 1000
  fixed_window: false
  fixed_window_dt: 25000

  shuffle: true
  spatial_factor: 1.0
  center_crop: false
  uniform_noise: false
  event_drop: false
  time_jitter: false
  pre_decimate: false
  pre_decimate_factor: 4
  decimation_rate: 1
  denoise_evs: false
  random_flip: false

quant_params:
  a_bit: 32
  w_bit: 32
  all_positive: false
  per_channel: true
  quant_inference: true
